[trading]
# Trading mode: day, swing, or both
mode = both

# Maximum number of simultaneous positions
max_positions = 5

# Maximum percentage of portfolio per position
max_position_pct = 20.0

# Minimum cash reserve percentage (never go below this)
min_cash_reserve_pct = 10.0

# Only trade during market hours
market_hours_only = true

[day_trading]
# Day trading specific settings
# PDT rule: requires $25,000+ account balance
pdt_compliant = true

# Close all day trade positions before market close (minutes before close)
close_before_eod_minutes = 15

# Minimum volume for day trade candidates
min_volume = 500000

# Minimum price for day trade stocks
min_price = 5.0

# Maximum price for day trade stocks
max_price = 500.0

[swing_trading]
# Swing trading specific settings
# Maximum hold period in days
max_hold_days = 14

# Minimum volume for swing trade candidates
min_volume = 200000

# Minimum price
min_price = 10.0

# Maximum price
max_price = 1000.0

[signals]
# Signal detection settings

# Minimum signal strength to trigger trade (0-100)
min_signal_strength = 65

# Number of confirmations required
min_confirmations = 2

# Signal weights (must sum to 100)
weight_rsi = 15
weight_macd = 20
weight_vwap = 15
weight_bollinger = 10
weight_ema_crossover = 15
weight_volume = 15
weight_atr = 10

[risk_management]
# Risk management settings

# Maximum daily loss (dollars)
max_daily_loss = 500.0

# Maximum daily loss percentage
max_daily_loss_pct = 2.0

# Stop loss percentage from entry
default_stop_loss_pct = 2.0

# Take profit percentage from entry
default_take_profit_pct = 4.0

# Trailing stop activation (percentage profit)
trailing_stop_activation_pct = 2.0

# Trailing stop distance percentage
trailing_stop_distance_pct = 1.0

# Maximum consecutive losses before pause
max_consecutive_losses = 3

# Pause duration after max losses (minutes)
pause_duration_minutes = 60

# Risk/reward minimum ratio
min_risk_reward_ratio = 2.0

[indicators]
# Technical indicator parameters

# RSI
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30

# MACD
macd_fast = 12
macd_slow = 26
macd_signal = 9

# VWAP
vwap_use_anchored = false

# Bollinger Bands
bb_period = 20
bb_std_dev = 2.0

# EMA Crossovers
ema_fast = 9
ema_slow = 21
ema_trend = 50

# Volume
volume_sma_period = 20
volume_surge_multiplier = 2.0

# ATR (Average True Range)
atr_period = 14
atr_stop_multiplier = 2.0

[scanner]
# Stock scanner settings

# Scan interval in seconds
scan_interval = 300

# Minimum market cap (millions)
min_market_cap = 500

# Sectors to include (comma-separated, or "all")
sectors = all

# Exclude penny stocks
exclude_penny_stocks = true

# Top N results to consider
top_results = 20

[watchlist]
# Default watchlist (comma-separated)
symbols = AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META,AMD,NFLX,SPY

[notifications]
# Notification settings

# Enable Discord notifications
discord_enabled = false

# Enable email notifications
email_enabled = false

# Notify on trade entry
notify_on_entry = true

# Notify on trade exit
notify_on_exit = true

# Notify on daily summary
notify_daily_summary = true

# Notify on errors/warnings
notify_on_error = true

[performance]
# Performance monitoring

# Log execution times
log_execution_times = true

# Performance report interval (minutes)
report_interval = 60

# Data bar interval for analysis (minutes)
bar_interval = 5
